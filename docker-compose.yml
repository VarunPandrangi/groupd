services:
  postgres:
    image: postgres:16-alpine
    container_name: groupd-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: groupd
      POSTGRES_USER: groupd_user
      POSTGRES_PASSWORD: groupd_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
      - ./backend/src/db/seeds/seed_admin.sql:/docker-entrypoint-initdb.d/zz_seed_admin.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groupd_user -d groupd"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: groupd-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://groupd_user:groupd_pass@postgres:5432/groupd
      JWT_SECRET: change-this-to-a-random-secret-string
      JWT_REFRESH_SECRET: change-this-to-another-random-secret
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api/v1
    container_name: groupd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
